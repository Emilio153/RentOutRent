<div class="login-container">
  <div class="login-card glass-panel">
    <div class="login-header">
      <h2 translate="no" class="notranslate">RentOutRent</h2>
      <p>Introduce tus credenciales para continuar</p>
    </div>

    <div *ngIf="errorMensaje" class="alert-danger">
      {{ errorMensaje }}
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">
      
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" class="form-control" name="emailLogin" [(ngModel)]="emailLogin" required placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" class="form-control" name="passwordLogin" [(ngModel)]="passwordLogin" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-primary btn-block" [disabled]="!loginForm.form.valid || cargando">
        {{ cargando ? 'Iniciando...' : 'Iniciar Sesión' }}
      </button>

      <p class="register-link">
        ¿Aún no tienes cuenta? <a routerLink="/registro">Regístrate aquí</a>
      </p>

    </form>
  </div>
</div>
