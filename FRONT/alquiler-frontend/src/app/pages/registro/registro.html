<div class="registro-container">
  <div class="registro-card glass-panel">
    <div class="registro-header">
      <h2 translate="no">Únete a RentOutRent</h2>
      <p>Comienza tu próxima aventura hoy mismo</p>
    </div>

    <div *ngIf="errorMensaje" class="alert-danger">
      {{ errorMensaje }}
    </div>

    <form (ngSubmit)="registrar()" #registroForm="ngForm" class="registro-form">
      
      <div class="form-row">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" class="form-control" name="nombre" [(ngModel)]="usuario.nombre" required placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
          <label>DNI / Pasaporte</label>
          <input type="text" class="form-control" name="dni" [(ngModel)]="usuario.dni" required placeholder="Ej. 12345678X">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" name="email" [(ngModel)]="usuario.email" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" class="form-control" name="telefono" [(ngModel)]="usuario.telefono" required placeholder="+34 600 000 000">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" class="form-control" name="password" [(ngModel)]="usuario.password" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input type="password" class="form-control" name="confirmPassword" [(ngModel)]="usuario.confirmPassword" required placeholder="••••••••">
        </div>
      </div>

      <div class="form-group role-selector">
        <label>¿Cómo quieres usar RentOutRent?</label>
        <div class="radio-group">
          <label class="radio-card" [class.active]="usuario.tipoUsuario === 'HUESPED'">
            <input type="radio" name="tipoUsuario" [(ngModel)]="usuario.tipoUsuario" value="HUESPED">
            <span class="icon">🧳</span>
            <span class="text">Quiero Viajar</span>
          </label>
          <label class="radio-card" [class.active]="usuario.tipoUsuario === 'PROPIETARIO'">
            <input type="radio" name="tipoUsuario" [(ngModel)]="usuario.tipoUsuario" value="PROPIETARIO">
            <span class="icon">🏠</span>
            <span class="text">Quiero Alquilar mi Casa</span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn-primary btn-block" [disabled]="!registroForm.form.valid || cargando">
        {{ cargando ? 'Creando cuenta...' : 'Crear Cuenta' }}
      </button>

      <p class="login-link">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
      </p>

    </form>
  </div>
</div>
